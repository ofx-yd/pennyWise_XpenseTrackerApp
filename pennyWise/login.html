<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>PennyWise Login</title>
  <link rel="stylesheet" href="static/css/styles.css">
</head>
<body>

  <!-- TOP HEADER -->
  <div class="header">PennyWise</div>

  <!-- CENTER CONTENT -->
  <div class="container">

    <div class="box">
      <h2>Welcome Back</h2>

      <form id="loginForm">

        <div class="input-group">
          <label>Email</label>
          <input type="email" id="loginEmail" placeholder="Enter your email">
          <div class="error" id="loginEmailError"></div>
        </div>

        <div class="input-group">
          <label>Password</label>
          <div class="password-wrapper">
            <input type="password" id="loginPassword" placeholder="Enter your password">
            <button type="button" onclick="togglePassword('loginPassword')">👁️</button>
          </div>
          <div class="error" id="loginPasswordError"></div>
        </div>

        <div style="margin-bottom:15px;">
          <input type="checkbox" id="rememberMe">
          <label for="rememberMe">Remember me</label>
        </div>

        <button class="btn" id="loginBtn">Login</button>

        <div class="success" id="loginSuccess"></div>
        <div class="error" id="loginGeneralError"></div>

      </form>

      <div class="extra">
        <p><a href="#">Forgot Password?</a></p>
        <p>No account? <a href="signup.html">Sign up</a></p>
      </div>

    </div>
  </div>

  <script src="static/js/auth.js"></script>
</body>
</html>
